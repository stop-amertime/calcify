[workspace]
resolver = "2"
members = [
    "crates/calcify-core",
    "crates/calcify-cli",
    "crates/calcify-wasm",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/stop-amertime/calcify"

[workspace.dependencies]
calcify-core = { path = "crates/calcify-core" }
cssparser = "0.37"
log = "0.4"
thiserror = "2"
