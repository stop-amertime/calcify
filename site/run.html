<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-DOS</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css-screen.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap">
  <style>
    .css-screen {
      font-family: 'VT323', 'DOS', 'Fixedsys', 'Terminal', 'Courier New', monospace;
      font-size: 16px;
      line-height: 1.2;
      color: #aaa;
      cursor: text;
    }
    .css-screen:focus { outline: 2px solid #0078d4; }
    .cell { height: 1.2em; }
    .screen-wrap {
      background: #000;
      padding: 12px;
      border: 2px inset #808080;
      display: flex;
      justify-content: center;
      margin: 8px 0;
    }
    .loader {
      color: #aaa;
      font-family: 'VT323', monospace;
      font-size: 16px;
      padding: 20px;
      white-space: pre;
    }
    .controls { display: flex; gap: 8px; align-items: center; margin: 4px 0; }
    .controls .info { font-size: 11px; color: #808080; margin-left: auto; }
    .hint-text { font-size: 11px; color: #808080; margin: 4px 0; }
  </style>
</head>
<body>
  <div class="desktop">
    <div class="window main-window">
      <div class="title-bar">
        <span class="title-icon">&#9632;</span>
        <span id="window-title">CSS-DOS</span>
        <span class="title-buttons">
          <span class="title-btn">&#9650;</span>
          <span class="title-btn">&#9660;</span>
        </span>
      </div>
      <div class="menu-bar">
        <span class="menu-item" onclick="location.href='index.html'">File</span>
        <span class="menu-item">View</span>
        <span class="menu-item">Help</span>
      </div>
      <div class="window-body">

        <a class="back-link" href="index.html">&laquo; Back to programs</a>

        <div class="controls">
          <button id="btn-pause" class="btn" disabled>&#9646;&#9646; Pause</button>
          <button id="btn-step" class="btn" style="display:none">Step</button>
          <span class="info" id="perf-info"></span>
        </div>

        <div class="screen-wrap">
          <div id="screen" class="css-screen" tabindex="0"></div>
          <div id="loader" class="loader">CSS-DOS v0.1

Loading...</div>
        </div>

        <p class="hint-text">Click the screen to focus, then type. Keyboard input is sent to the DOS program.</p>
        <div class="controls" style="margin-top:4px;">
          <label class="btn" style="cursor:pointer;">
            Load .css / .com / .exe
            <input type="file" id="file-input" accept=".css,.html,.htm,.com,.exe" style="display:none;">
          </label>
          <span style="font-size:11px; color:#808080;">CSS files run directly. COM/EXE files are transpiled to CSS first (requires <code>node serve.mjs</code>).</span>
        </div>

      </div>
      <div class="status-bar">
        <span id="status-text">Loading...</span>
        <span class="status-right" id="status-right"></span>
      </div>
    </div>
  </div>

<script>
// ============================================================
// CSS-DOS Browser Runner — Calcite WASM via Web Worker
// ============================================================

const PROGRAMS = {
  zork1:    { title: 'Zork I',           cssFile: 'zork1.css.gz' },
  tetris2k: { title: 'SmallTetris',      cssFile: 'tetris2k.css.gz' },
  eliza:    { title: 'ELIZA',            cssFile: 'eliza.css.gz' },
  snake:    { title: 'Snake',            cssFile: 'snake.css.gz' },
  linkfour: { title: 'Connect Four',     cssFile: 'linkfour.css.gz' },
  monosol:  { title: 'Mono Solitaire',   cssFile: 'monosol.css.gz' },
  bootle:   { title: 'Bootle',           cssFile: 'bootle.css.gz' },
  fib:      { title: 'Fibonacci',        cssFile: 'fib.css.gz' },
  shell:    { title: 'DOS Shell',        cssFile: 'shell.css.gz' },
};

const params = new URLSearchParams(location.search);
const programId = params.get('p');
const prog = PROGRAMS[programId];

const statusEl = document.getElementById('status-text');
const loaderEl = document.getElementById('loader');
const screenEl = document.getElementById('screen');
const perfEl = document.getElementById('perf-info');
const btnPause = document.getElementById('btn-pause');
const btnStep = document.getElementById('btn-step');

if (!prog) {
  document.getElementById('window-title').textContent = 'CSS-DOS';
  loaderEl.textContent = 'CSS-DOS v0.1\n\nLoading file list...\n';
  statusEl.textContent = 'Ready';
  showFileList();
} else {
  document.title = `CSS-DOS — ${prog.title}`;
  document.getElementById('window-title').textContent = `CSS-DOS — ${prog.title}`;
  loaderEl.textContent = `CSS-DOS v0.1\n\nLoading ${prog.title}...\n`;
  boot();
}

// ============================================================
// Build screen cells (80x25 grid, CSS renders characters)
// ============================================================
const cells = [];
for (let i = 0; i < 80 * 25; i++) {
  const cell = document.createElement('span');
  cell.className = 'cell';
  cell.innerHTML = '<span class="cv"><i></i></span>';
  screenEl.appendChild(cell);
  cells.push(cell);
}
screenEl.style.display = 'none'; // hidden until loaded

let _screenUpdateCount = 0;
function updateScreen(videoBytes) {
  let changed = 0;
  for (let i = 0; i < cells.length && i < videoBytes.length; i++) {
    const val = videoBytes[i];
    if (cells[i]._v !== val) {
      cells[i].style.setProperty('--val', val);
      cells[i]._v = val;
      changed++;
    }
  }
  _screenUpdateCount++;
  if (_screenUpdateCount <= 3 || changed > 0 && _screenUpdateCount % 100 === 0) {
    console.log(`[screen] update #${_screenUpdateCount}: ${changed} cells changed, bytes[0..5]=[${Array.from(videoBytes.slice(0,5))}], cells.length=${cells.length}`);
  }
}

// ============================================================
// DOS keyboard scancode map
// ============================================================
const SCAN = {
  Escape: 0x01, Digit1: 0x02, Digit2: 0x03, Digit3: 0x04, Digit4: 0x05,
  Digit5: 0x06, Digit6: 0x07, Digit7: 0x08, Digit8: 0x09, Digit9: 0x0A,
  Digit0: 0x0B, Minus: 0x0C, Equal: 0x0D, Backspace: 0x0E, Tab: 0x0F,
  KeyQ: 0x10, KeyW: 0x11, KeyE: 0x12, KeyR: 0x13, KeyT: 0x14,
  KeyY: 0x15, KeyU: 0x16, KeyI: 0x17, KeyO: 0x18, KeyP: 0x19,
  BracketLeft: 0x1A, BracketRight: 0x1B, Enter: 0x1C, NumpadEnter: 0x1C,
  KeyA: 0x1E, KeyS: 0x1F, KeyD: 0x20, KeyF: 0x21, KeyG: 0x22,
  KeyH: 0x23, KeyJ: 0x24, KeyK: 0x25, KeyL: 0x26,
  Semicolon: 0x27, Quote: 0x28, Backquote: 0x29,
  Backslash: 0x2B,
  KeyZ: 0x2C, KeyX: 0x2D, KeyC: 0x2E, KeyV: 0x2F, KeyB: 0x30,
  KeyN: 0x31, KeyM: 0x32, Comma: 0x33, Period: 0x34, Slash: 0x35,
  Space: 0x39,
  // Extended keys (ascii = 0, scancode in high byte)
  ArrowUp: 0x48, ArrowDown: 0x50, ArrowLeft: 0x4B, ArrowRight: 0x4D,
  Home: 0x47, End: 0x4F, PageUp: 0x49, PageDown: 0x51,
  Insert: 0x52, Delete: 0x53,
  F1: 0x3B, F2: 0x3C, F3: 0x3D, F4: 0x3E, F5: 0x3F,
  F6: 0x40, F7: 0x41, F8: 0x42, F9: 0x43, F10: 0x44,
};

const EXTENDED_KEYS = new Set([
  'ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
  'Home','End','PageUp','PageDown','Insert','Delete',
  'F1','F2','F3','F4','F5','F6','F7','F8','F9','F10',
]);

function keyToDos(e) {
  const scan = SCAN[e.code];
  if (scan === undefined) return 0;
  if (EXTENDED_KEYS.has(e.code)) {
    // Extended: ascii=0, scancode in high byte
    return scan << 8;
  }
  // Normal key: ascii from e.key (single char), scancode in high byte
  let ascii = 0;
  if (e.key.length === 1) ascii = e.key.charCodeAt(0);
  else if (e.code === 'Enter' || e.code === 'NumpadEnter') ascii = 0x0D;
  else if (e.code === 'Backspace') ascii = 0x08;
  else if (e.code === 'Tab') ascii = 0x09;
  else if (e.code === 'Escape') ascii = 0x1B;
  else if (e.code === 'Space') ascii = 0x20;
  return (scan << 8) | (ascii & 0xFF);
}

// ============================================================
// Worker — all WASM runs off the main thread
// ============================================================
const worker = new Worker('calcite-worker.js');
let running = false;
let paused = false;
let totalTicks = 0;
let lastPerfTime = performance.now();
let lastPerfTicks = 0;

worker.onmessage = (e) => {
  const msg = e.data;
  switch (msg.type) {
    case 'progress':
      loaderEl.textContent += msg.detail + '\n';
      statusEl.textContent = msg.detail;
      break;

    case 'ready':
      loaderEl.textContent += '\nStarting...\n';
      statusEl.textContent = 'Running';
      loaderEl.style.display = 'none';
      screenEl.style.display = '';
      screenEl.focus();
      btnPause.disabled = false;
      running = true;
      lastPerfTime = performance.now();
      lastPerfTicks = 0;
      totalTicks = 0;
      // Kick off the tick loop
      worker.postMessage({ type: 'tick', count: 500 });
      break;

    case 'tick-result': {
      const bytes = msg.videoBytes ? new Uint8Array(msg.videoBytes) : null;
      if (bytes) {
        if (totalTicks === 0) {
          // First tick result — log diagnostics
          console.log('[tick-result] bytes type:', typeof msg.videoBytes, 'constructor:', msg.videoBytes?.constructor?.name);
          console.log('[tick-result] wrapped type:', bytes.constructor.name, 'length:', bytes.length);
          console.log('[tick-result] first 20 values:', Array.from(bytes.slice(0, 20)));
          console.log('[tick-result] non-zero count:', bytes.filter(b => b !== 0).length, '/', bytes.length);
        }
        updateScreen(bytes);
      } else if (totalTicks === 0) {
        console.warn('[tick-result] no videoBytes received');
      }
      totalTicks += msg.ticks;
      // Perf counter
      const now = performance.now();
      if (now - lastPerfTime > 500) {
        const elapsed = (now - lastPerfTime) / 1000;
        const tps = (totalTicks - lastPerfTicks) / elapsed;
        perfEl.textContent = `${(tps / 1000).toFixed(0)}k ticks/s | ${totalTicks.toLocaleString()} total`;
        lastPerfTime = now;
        lastPerfTicks = totalTicks;
      }
      // Request next batch
      if (running && !paused) {
        worker.postMessage({ type: 'tick', count: 500 });
      }
      break;

    case 'error':
      loaderEl.textContent += `\nERROR: ${msg.message}\n`;
      loaderEl.style.display = '';
      statusEl.textContent = 'Error';
      running = false;
      break;
  }
};

// ============================================================
// Boot helpers
// ============================================================
function bootFromUrl(url) {
  running = false;
  loaderEl.style.display = '';
  screenEl.style.display = 'none';
  loaderEl.textContent = `CSS-DOS v0.1\n\n`;
  worker.postMessage({ type: 'load-url', url });
}

function boot() {
  bootFromUrl(`/output/${prog.cssFile}`);
}

async function showFileList() {
  try {
    const resp = await fetch('/list');
    if (!resp.ok) throw new Error('Could not fetch file list');
    const { css, programs } = await resp.json();

    const raw = css.filter(f => f.name.endsWith('.css') && !f.name.endsWith('.css.gz'));

    loaderEl.textContent = '';
    const header = document.createElement('span');
    header.textContent = 'CSS-DOS v0.1\n\n';
    loaderEl.appendChild(header);

    if (raw.length > 0) {
      const label = document.createElement('span');
      label.textContent = 'Ready to run:\n';
      loaderEl.appendChild(label);
      for (const f of raw) {
        const link = document.createElement('a');
        link.href = '#';
        link.textContent = `  ▶ ${f.name}  (${(f.size / 1024 / 1024).toFixed(0)} MB)\n`;
        link.style.cssText = 'color:#4fc3f7; cursor:pointer; text-decoration:underline;';
        link.onclick = (e) => { e.preventDefault(); launchCss(f.name); };
        loaderEl.appendChild(link);
      }
    }

    if (programs.length > 0) {
      const sep = document.createElement('span');
      sep.textContent = '\nPrograms (generate CSS first):\n';
      loaderEl.appendChild(sep);
      for (const f of programs) {
        const link = document.createElement('a');
        link.href = '#';
        link.textContent = `  ⚙ ${f.name}  (${f.size} bytes)\n`;
        link.style.cssText = 'color:#aaa; cursor:pointer; text-decoration:underline;';
        link.onclick = (e) => { e.preventDefault(); launchProgram(f.name); };
        loaderEl.appendChild(link);
      }
    }

    if (raw.length === 0 && programs.length === 0) {
      const msg = document.createElement('span');
      msg.textContent = 'No files found.\nDrop a .com, .exe, or .css file onto the page.';
      loaderEl.appendChild(msg);
    }

    const hint = document.createElement('span');
    hint.textContent = '\n\nOr drop a file onto the page.';
    loaderEl.appendChild(hint);
  } catch (err) {
    loaderEl.textContent = 'CSS-DOS v0.1\n\nCould not reach server.\nStart it with: node serve.mjs';
  }
}

function launchCss(filename) {
  document.getElementById('window-title').textContent = `CSS-DOS — ${filename}`;
  document.title = `CSS-DOS — ${filename}`;
  bootFromUrl(`/output/${filename}`);
}

async function launchProgram(filename) {
  running = false;
  document.getElementById('window-title').textContent = `CSS-DOS — ${filename}`;
  document.title = `CSS-DOS — ${filename}`;
  loaderEl.style.display = '';
  screenEl.style.display = 'none';
  loaderEl.textContent = `CSS-DOS v0.1\n\nGenerating CSS for ${filename}...\n`;
  statusEl.textContent = 'Generating CSS (this takes a while)...';
  try {
    const binResp = await fetch(`/programs/${filename}`);
    if (!binResp.ok) throw new Error(`Could not fetch ${filename}`);
    const blob = await binResp.blob();
    const form = new FormData();
    form.append('program', new File([blob], filename));
    const genResp = await fetch('/generate', { method: 'POST', body: form });
    if (!genResp.ok) {
      const err = await genResp.json().catch(() => ({ error: genResp.statusText }));
      throw new Error(err.details || err.error);
    }
    const result = await genResp.json();
    loaderEl.textContent += `CSS generated in ${result.elapsed}s (${(result.size / 1024 / 1024).toFixed(0)} MB)\n`;
    bootFromUrl(`/output/${result.file}`);
  } catch (err) {
    loaderEl.textContent += `\nERROR: ${err.message}\n`;
    statusEl.textContent = 'Error';
  }
}

// ============================================================
// Keyboard input — sent to worker
// ============================================================
screenEl.addEventListener('keydown', (e) => {
  if (!running) return;
  const dosKey = keyToDos(e);
  if (dosKey) {
    worker.postMessage({ type: 'keyboard', key: dosKey });
    e.preventDefault();
  }
});

screenEl.addEventListener('keyup', () => {
  if (running) worker.postMessage({ type: 'keyboard', key: 0 });
});

document.querySelector('.window-body').addEventListener('mousedown', (e) => {
  if (e.target.tagName !== 'BUTTON' && e.target.tagName !== 'A') {
    setTimeout(() => screenEl.focus(), 0);
  }
});

// ============================================================
// Controls
// ============================================================
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.innerHTML = paused ? '&#9654; Resume' : '&#9646;&#9646; Pause';
  btnStep.style.display = paused ? '' : 'none';
  statusEl.textContent = paused ? 'Paused' : 'Running';
  if (!paused && running) worker.postMessage({ type: 'tick', count: 500 });
});

btnStep.addEventListener('click', () => {
  if (!running || !paused) return;
  worker.postMessage({ type: 'tick', count: 1 });
});

// ============================================================
// File picker + drag-and-drop
// ============================================================
async function loadFile(file) {
  running = false;
  loaderEl.style.display = '';
  screenEl.style.display = 'none';
  loaderEl.textContent = `CSS-DOS v0.1\n\nLoading ${file.name}...\n`;
  statusEl.textContent = `Loading ${file.name}...`;
  document.getElementById('window-title').textContent = `CSS-DOS — ${file.name}`;
  document.title = `CSS-DOS — ${file.name}`;

  const ext = file.name.split('.').pop().toLowerCase();

  try {
    if (ext === 'com' || ext === 'exe') {
      loaderEl.textContent += `Uploading to transpiler...\n`;
      statusEl.textContent = 'Generating CSS...';
      const form = new FormData();
      form.append('program', file);
      const resp = await fetch('/generate', { method: 'POST', body: form });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        throw new Error(err.details || err.error);
      }
      const result = await resp.json();
      loaderEl.textContent += `CSS generated in ${result.elapsed}s\n`;
      bootFromUrl(`/output/${result.file}`);
    } else if (ext === 'css') {
      loaderEl.textContent += `Uploading to server...\n`;
      const resp = await fetch('/upload', { method: 'POST', body: file, headers: { 'X-Filename': file.name } });
      if (!resp.ok) throw new Error(`Upload failed: ${resp.statusText}`);
      const result = await resp.json();
      bootFromUrl(`/output/${result.file}`);
    } else {
      throw new Error(`Unsupported file type: .${ext}`);
    }
  } catch (err) {
    loaderEl.textContent += `\nERROR: ${err.message}\n`;
    if (err.message.includes('Failed to fetch')) {
      loaderEl.textContent += '\nIs the dev server running?\n  node serve.mjs\n';
    }
    statusEl.textContent = 'Error';
  }
}

document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
document.body.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
document.body.addEventListener('drop', (e) => { e.preventDefault(); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

</script>
</body>
</html>
