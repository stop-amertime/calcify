<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calc(ite)</title>
  <style>
    @font-face {
      font-family: 'DOS';
      src: local('Perfect DOS VGA 437'), local('Fixedsys'), local('Terminal');
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DOS', 'Fixedsys', 'Terminal', monospace;
      font-size: 14px;
      background: #008080;
      color: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px;
      cursor: default;
      image-rendering: pixelated;
    }

    /* ── Windows 1.0 / DOS-era beveled box ── */
    .window {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      box-shadow: 1px 1px 0 #000;
      width: 720px;
      max-width: 100%;
      margin-bottom: 4px;
    }

    .title-bar {
      background: #000080;
      color: #fff;
      padding: 2px 4px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .window-body {
      padding: 6px;
    }

    /* ── DOS-era buttons ── */
    .btn {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      font-family: inherit;
      font-size: 12px;
      padding: 3px 12px;
      cursor: pointer;
      color: #000;
      min-width: 70px;
    }

    .btn:active:not(:disabled) {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
      padding: 4px 11px 2px 13px;
    }

    .btn:disabled {
      color: #808080;
      text-shadow: 1px 1px 0 #fff;
    }

    .btn:focus {
      outline: 1px dotted #000;
      outline-offset: -4px;
    }

    /* ── Sunken fields ── */
    .field-dark {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #000;
      color: #33ff33;
      font-family: inherit;
      font-size: 14px;
      padding: 8px;
      white-space: pre;
      line-height: 1.15;
      min-height: 200px;
      overflow-y: auto;
      max-height: none;
    }

    /* ── Layout helpers ── */
    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .row:last-child { margin-bottom: 0; }

    label { font-size: 12px; }

    .spacer { flex: 1; }

    input[type="number"] { width: 60px; }

    .field {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #fff;
      color: #000;
      font-family: inherit;
      font-size: 12px;
      padding: 2px 4px;
    }

    /* ── Status bar ── */
    .status-bar {
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      border-bottom: 1px solid #fff;
      background: #c0c0c0;
      padding: 2px 4px;
      font-size: 11px;
      margin-top: 4px;
      color: #000;
    }

    /* ── On-screen keyboard ──
       Three column sections side by side: main (letters + numbers + space),
       modifier stack (Esc above Enter above Tab), arrow cluster (up row,
       then left/down/right).
       Buttons are wired to the calcite wasm engine via JS pointer events
       (see script block). The generated CSS also has :has(button:active)
       rules — those only matter when the .css is opened in Chrome directly. */
    /* Two columns: main letter block on the left flexes to fill remaining
       width; right column stacks modifiers above the arrow cluster. */
    .keyboard {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 8px;
      user-select: none;
      -webkit-user-select: none;
    }

    .kb-main {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
    }

    /* Right-hand stack: modifiers row on top, arrow cluster pinned to
       the bottom-right of the available vertical space. */
    .kb-right-stack {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 2px;
      justify-items: end;
    }

    /* Slight amber tint for Enter so it reads as a primary action. */
    .kb-enter {
      background: #d8c898;
    }
    .kb-enter:active,
    .kb-enter.pressed {
      background: #b8a878;
    }

    /* Esc | Tab | Enter in one row, spanning the same width as the arrows. */
    .kb-modifiers {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }

    .kb-arrows {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 34px 34px;
      gap: 2px;
      width: 165px; /* fixed so the row stays clickable even on narrow screens */
      grid-row: 3; /* bottom of the right-stack */
    }

    .kb-key {
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      font-family: inherit;
      font-size: 13px;
      padding: 0;
      height: 34px;
      cursor: pointer;
      color: #000;
      touch-action: none;
    }

    .kb-key:active,
    .kb-key.pressed {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #fff;
      border-bottom: 2px solid #fff;
    }

    /* Space bar spans the main-section row. */
    .kb-space { grid-column: 1 / -1; height: 28px; font-size: 11px; }

    /* Arrow cluster placement: Up centered on row 1; Left/Down/Right on row 2. */
    .kb-up    { grid-column: 2; grid-row: 1; }
    .kb-left  { grid-column: 1; grid-row: 2; }
    .kb-down  { grid-column: 2; grid-row: 2; }
    .kb-right { grid-column: 3; grid-row: 2; }
    .kb-arrow { font-size: 16px; }

    /* ── Group box ── */
    .group {
      border: 1px solid #808080;
      padding: 8px 6px 6px;
      margin-bottom: 6px;
      position: relative;
    }

    .group-label {
      position: absolute;
      top: -7px;
      left: 8px;
      background: #c0c0c0;
      padding: 0 4px;
      font-size: 11px;
    }

    hr.groove {
      border: none;
      border-top: 1px solid #808080;
      border-bottom: 1px solid #fff;
      margin: 6px 0;
    }

    input[type="file"] { display: none; }

    /* ── Mode badge ── */
    .mode-badge {
      display: inline-block;
      background: #000080;
      color: #fff;
      padding: 1px 6px;
      font-size: 10px;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <!-- ── Main Window ── -->
  <div class="window">
    <div class="title-bar">
      <span>calc(ite) - CSS Program Runner</span>
    </div>
    <div class="window-body">

      <!-- File + controls -->
      <div class="group">
        <span class="group-label">Program</span>
        <div class="row">
          <label id="file-label" class="btn" style="display:inline-block; text-align:center;">
            Open .css
            <input id="file-input" type="file" accept=".css,.html,.htm">
          </label>
          <div class="spacer"></div>
          <span id="file-name" style="font-size:11px; color:#808080;">No file loaded</span>
          <span id="mode-badge" class="mode-badge" style="display:none;"></span>
        </div>
        <div class="row">
          <button id="btn-start" class="btn" disabled>Run</button>
          <button id="btn-stop" class="btn" disabled>Stop</button>
          <div class="spacer"></div>
          <label>Ticks/batch:</label>
          <input id="batch-size" class="field" type="number" value="100" min="1" max="10000">
        </div>
      </div>

      <hr class="groove">

      <!-- Output area — switches between canvas (graphics), screen text, and string props -->
      <div id="output" class="field-dark"></div>
      <canvas
        id="screen-canvas"
        width="320"
        height="200"
        style="display:none; width: 640px; height: 400px; background:#000; image-rendering: pixelated; border-top: 1px solid #808080; border-left: 1px solid #808080; border-right: 1px solid #fff; border-bottom: 1px solid #fff;"
      ></canvas>

      <!-- Status bar -->
      <div class="status-bar">
        <span id="status">Drop a .css file to begin</span>
        <span style="float:right" id="stats"></span>
      </div>
      <!--
        On-screen keyboard. Each button has a data-key attribute set to the
        16-bit BDA key code (scancode<<8 | ascii). The JS block below wires
        pointerdown/pointerup → worker 'keyboard' messages.
      -->
      <div class="keyboard">
        <div class="kb-main">
          <button class="kb-key" data-key="0x0231">1</button>
          <button class="kb-key" data-key="0x0332">2</button>
          <button class="kb-key" data-key="0x0433">3</button>
          <button class="kb-key" data-key="0x0534">4</button>
          <button class="kb-key" data-key="0x0635">5</button>
          <button class="kb-key" data-key="0x0736">6</button>
          <button class="kb-key" data-key="0x0837">7</button>
          <button class="kb-key" data-key="0x0938">8</button>
          <button class="kb-key" data-key="0x0A39">9</button>
          <button class="kb-key" data-key="0x0B30">0</button>

          <button class="kb-key" data-key="0x1071">Q</button>
          <button class="kb-key" data-key="0x1177">W</button>
          <button class="kb-key" data-key="0x1265">E</button>
          <button class="kb-key" data-key="0x1372">R</button>
          <button class="kb-key" data-key="0x1474">T</button>
          <button class="kb-key" data-key="0x1579">Y</button>
          <button class="kb-key" data-key="0x1675">U</button>
          <button class="kb-key" data-key="0x1769">I</button>
          <button class="kb-key" data-key="0x186F">O</button>
          <button class="kb-key" data-key="0x1970">P</button>

          <button class="kb-key" data-key="0x1E61">A</button>
          <button class="kb-key" data-key="0x1F73">S</button>
          <button class="kb-key" data-key="0x2064">D</button>
          <button class="kb-key" data-key="0x2166">F</button>
          <button class="kb-key" data-key="0x2267">G</button>
          <button class="kb-key" data-key="0x2368">H</button>
          <button class="kb-key" data-key="0x246A">J</button>
          <button class="kb-key" data-key="0x256B">K</button>
          <button class="kb-key" data-key="0x266C">L</button>
          <button class="kb-key kb-enter" data-key="0x1C0D">Enter</button>

          <button class="kb-key" data-key="0x2C7A">Z</button>
          <button class="kb-key" data-key="0x2D78">X</button>
          <button class="kb-key" data-key="0x2E63">C</button>
          <button class="kb-key" data-key="0x2F76">V</button>
          <button class="kb-key" data-key="0x3062">B</button>
          <button class="kb-key" data-key="0x316E">N</button>
          <button class="kb-key" data-key="0x326D">M</button>
          <button class="kb-key" data-key="0x332C">,</button>
          <button class="kb-key" data-key="0x342E">.</button>
          <button class="kb-key" data-key="0x352F">/</button>

          <button class="kb-key kb-space" data-key="0x3920">&#x2423;</button>
        </div>

        <div class="kb-right-stack">
          <div class="kb-modifiers">
            <button class="kb-key" data-key="0x011B">Esc</button>
            <button class="kb-key" data-key="0x0F09">Tab</button>
            <button class="kb-key" data-key="0x0E08">Bksp</button>
          </div>

          <div class="kb-arrows">
            <button class="kb-key kb-arrow kb-up"    data-key="0x4800">&#x2191;</button>
            <button class="kb-key kb-arrow kb-left"  data-key="0x4B00">&#x2190;</button>
            <button class="kb-key kb-arrow kb-down"  data-key="0x5000">&#x2193;</button>
            <button class="kb-key kb-arrow kb-right" data-key="0x4D00">&#x2192;</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const worker = new Worker('calcite-worker.js', { type: 'module' });
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const canvas = document.getElementById('screen-canvas');
    const ctx = canvas.getContext('2d');
    const stats = document.getElementById('stats');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const batchInput = document.getElementById('batch-size');
    const fileInput = document.getElementById('file-input');
    const fileName = document.getElementById('file-name');
    const modeBadge = document.getElementById('mode-badge');

    // Real 4.77 MHz 8086 clock rate — the reference the speed meter compares to.
    const REAL_8086_HZ = 4_772_727;

    function formatHz(hz) {
      if (hz >= 1_000_000) return (hz / 1_000_000).toFixed(2) + ' MHz';
      if (hz >= 1_000)     return (hz / 1_000).toFixed(1) + ' KHz';
      return hz.toFixed(0) + ' Hz';
    }

    let running = false;
    let totalTicks = 0;
    let totalCycles = 0;
    let startTime = 0;
    let engineReady = false;
    // Detected video regions: { text: {...}|null, gfx: {...}|null }
    let video = { text: null, gfx: null };
    // Cached ImageData for the gfx canvas, sized on first use.
    let gfxImageData = null;
    // Last known video mode byte from BDA 0x0449. Used to switch display.
    // Undefined so the first tick-result always flips the visible element on.
    // (Starting at 0x03 and receiving 0x03 made the toggle a no-op, leaving
    // both canvas and output hidden → zero-height container.)
    let currentVideoMode = null;

    worker.onmessage = ({ data }) => {
      switch (data.type) {
        case 'ready': {
          engineReady = true;
          btnStart.disabled = false;
          video = data.video || { text: null, gfx: null };

          // Mode badge: "GFX 320x200", "TEXT 80x25", or "GFX+TEXT".
          const labels = [];
          if (video.gfx)  labels.push(`GFX ${video.gfx.width}x${video.gfx.height}`);
          if (video.text) labels.push(`TEXT ${video.text.width}x${video.text.height}`);
          modeBadge.textContent = labels.join(' + ') || 'NO VIDEO';
          modeBadge.style.display = '';

          // Pre-size the canvas if a gfx region is present. Visibility is
          // controlled at runtime by the BDA video mode byte, not bake-time.
          if (video.gfx) {
            canvas.width = video.gfx.width;
            canvas.height = video.gfx.height;
            // Scale up via CSS so 320x200 is viewable on modern monitors.
            canvas.style.width = (video.gfx.width * 2) + 'px';
            canvas.style.height = (video.gfx.height * 2) + 'px';
            gfxImageData = ctx.createImageData(video.gfx.width, video.gfx.height);
          }
          // Start hidden; first tick-result will show the right one.
          canvas.style.display = 'none';
          output.style.display = 'none';

          // Auto-run as soon as the engine is ready. The Run/Stop buttons
          // still work as pause/resume; they just aren't required to see
          // any output in the first place.
          startRunning();
          break;
        }

        case 'tick-result': {
          totalTicks += data.ticks;
          // Worker sends absolute cycleCount each batch — take it directly.
          totalCycles = data.cycles != null ? data.cycles : totalCycles;
          const elapsed = (performance.now() - startTime) / 1000;
          const tps = elapsed > 0 ? totalTicks / elapsed : 0;
          const cps = elapsed > 0 ? totalCycles / elapsed : 0;
          const pct = cps / REAL_8086_HZ * 100;
          const cpt = totalTicks > 0 ? totalCycles / totalTicks : 0;
          stats.textContent =
            `${totalTicks.toLocaleString()} ticks | ${tps.toFixed(0)} t/s | ` +
            `${formatHz(cps)} (${pct.toFixed(1)}% of 4.77 MHz) | ${cpt.toFixed(1)} cyc/tick`;

          // Switch display based on BDA video mode byte (runtime source of truth).
          // A program that switches from text to Mode 13h mid-run is handled
          // correctly because we check every tick, not just at init.
          const isGfxMode = (data.videoMode === 0x13);
          const wasGfxMode = (currentVideoMode === 0x13);
          if (currentVideoMode === null || isGfxMode !== wasGfxMode) {
            if (isGfxMode) {
              canvas.style.display = '';
              output.style.display = 'none';
            } else {
              canvas.style.display = 'none';
              output.style.display = '';
              output.style.minHeight = '0';
            }
          }
          currentVideoMode = data.videoMode;

          // Graphics: blit RGBA bytes straight to the canvas.
          if (data.gfxBytes && gfxImageData) {
            const src = new Uint8Array(data.gfxBytes);
            gfxImageData.data.set(src);
            ctx.putImageData(gfxImageData, 0, 0);
          }

          // Text mode: write the rendered screen HTML (with CGA color spans).
          if (!isGfxMode && data.screen != null) {
            output.innerHTML = data.screen;
          } else if (!isGfxMode && !video.text && data.stringProperties) {
            // Legacy path: string-property output (only used when neither
            // text nor gfx regions were detected).
            const parts = [];
            for (const [key, value] of Object.entries(data.stringProperties)) {
              if (value) parts.push(value);
            }
            if (parts.length > 0) {
              const text = parts.join('\n');
              const lines = text.split('\n');
              output.textContent = lines.length > 50 ? lines.slice(-50).join('\n') : text;
              output.scrollTop = output.scrollHeight;
            }
          }

          if (running) {
            worker.postMessage({ type: 'tick', count: parseInt(batchInput.value, 10) || 100 });
          }
          break;
        }

        case 'error':
          status.textContent = `Error: ${data.message}`;
          running = false;
          btnStart.disabled = !engineReady;
          btnStop.disabled = true;
          break;
      }
    };

    function startRunning() {
      if (!engineReady || running) return;
      running = true;
      startTime = performance.now();
      totalTicks = 0;
      totalCycles = 0;
      btnStart.disabled = true;
      btnStop.disabled = false;
      status.textContent = 'Running...';
      worker.postMessage({ type: 'tick', count: parseInt(batchInput.value, 10) || 100 });
    }

    btnStart.addEventListener('click', startRunning);

    btnStop.addEventListener('click', () => {
      running = false;
      btnStart.disabled = false;
      btnStop.disabled = true;
      status.textContent = 'Stopped';
    });

    function extractCssFromHtml(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const styles = doc.querySelectorAll('style');
      return Array.from(styles).map(s => s.textContent).join('\n');
    }

    window.loadCss = loadCss;
    function loadCss(cssText) {
      if (!cssText || cssText.trim().length === 0) {
        status.textContent = 'Loaded file has no CSS content (empty or whitespace only)';
        return;
      }
      running = false;
      engineReady = false;
      video = { text: null, gfx: null };
      gfxImageData = null;
      totalTicks = 0;
      totalCycles = 0;
      btnStart.disabled = true;
      btnStop.disabled = true;
      output.textContent = '';
      canvas.style.display = 'none';
      stats.textContent = '';
      modeBadge.style.display = 'none';
      status.textContent = `Compiling ${(cssText.length / 1024).toFixed(0)} KB...`;
      worker.postMessage({ type: 'init', css: cssText });
    }

    function readFileAndLoad(file) {
      fileName.textContent = file.name;
      const sizeMb = file.size / 1024 / 1024;
      status.textContent = `Reading ${sizeMb.toFixed(1)} MB…`;
      const reader = new FileReader();
      reader.onload = () => {
        let text = reader.result;
        if (text == null || text.length === 0) {
          status.textContent = `Error: FileReader returned empty for ${file.name} (${sizeMb.toFixed(1)} MB). Files over ~500 MB cannot be loaded via the file picker on most browsers.`;
          return;
        }
        if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
          text = extractCssFromHtml(text);
        }
        loadCss(text);
      };
      reader.onerror = () => {
        status.textContent = `FileReader error: ${reader.error?.message || 'unknown'}`;
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) readFileAndLoad(file);
    });

    // ── Drag and drop ──
    document.body.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    document.body.addEventListener('drop', (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file) readFileAndLoad(file);
    });

    // ── On-screen keyboard ──
    // Calcite can't evaluate :has(:active) selector matching, so we bridge
    // the buttons to the wasm engine via JS. Each button has data-key set
    // to (scancode<<8 | ascii); pointerdown sends the key, pointerup clears.
    // Multi-touch: track active pointers so releasing one finger doesn't
    // clear the key while another is still down.
    const activePointers = new Map(); // pointerId → key code
    function sendKey(code) {
      if (!engineReady) return;
      worker.postMessage({ type: 'keyboard', key: code });
    }
    for (const btn of document.querySelectorAll('.kb-key')) {
      const code = parseInt(btn.dataset.key, 16);
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        btn.setPointerCapture(e.pointerId);
        activePointers.set(e.pointerId, code);
        sendKey(code);
      });
      const release = (e) => {
        if (!activePointers.has(e.pointerId)) return;
        activePointers.delete(e.pointerId);
        if (activePointers.size === 0) sendKey(0);
      };
      btn.addEventListener('pointerup', release);
      btn.addEventListener('pointercancel', release);
      btn.addEventListener('pointerleave', release);
      // Block browser context menu on long-press (mobile).
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    // Auto-load from ?css=filename URL param
    const cssParam = new URLSearchParams(location.search).get('css');
    if (cssParam) {
      fileName.textContent = cssParam;
      status.textContent = `Fetching ${cssParam}...`;
      fetch(`/output/${cssParam}`)
        .then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          status.textContent = `Downloading ${cssParam}...`;
          return r.text();
        })
        .then(css => {
          status.textContent = `Loaded ${(css.length / 1024 / 1024).toFixed(0)} MB`;
          loadCss(css);
        })
        .catch(e => { status.textContent = `Error: ${e.message}`; });
    }
  </script>
</body>
</html>
